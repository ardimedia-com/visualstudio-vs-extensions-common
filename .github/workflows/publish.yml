name: Publish to NuGet

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: dotnet build src/Ardimedia.VsExtensions.Common/Ardimedia.VsExtensions.Common.csproj -c Release -p:Version=1.0.${{ github.run_number }}

      - name: Push to NuGet
        run: |
          $pkg = Get-ChildItem -Path src -Recurse -Filter *.nupkg | Select-Object -First 1
          Write-Host "Pushing $($pkg.FullName)"
          dotnet nuget push $pkg.FullName --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate
