name: Publish to NuGet

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/Ardimedia.VsExtensions.Common/Ardimedia.VsExtensions.Common.csproj

      - name: Build
        run: dotnet build src/Ardimedia.VsExtensions.Common/Ardimedia.VsExtensions.Common.csproj -c Release --no-restore

      - name: Pack
        run: dotnet pack src/Ardimedia.VsExtensions.Common/Ardimedia.VsExtensions.Common.csproj -c Release --no-build -o ./nupkg

      - name: Push to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate
